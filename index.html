<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#D94F3D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Polyphonic">
    <meta name="description" content="음악 아카이빙 앱">

    <title>Polyphonic</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="root">
        <!-- 로딩 화면 -->
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;font-family:sans-serif;">
            <div style="text-align:center;">
                <div style="font-size:24px;font-weight:900;letter-spacing:-0.5px;">
                    POLY<span style="color:#D94F3D;">PHONIC</span>
                </div>
                <div style="font-size:13px;color:#999;margin-top:8px;">불러오는 중...</div>
            </div>
        </div>
    </div>

    <!-- Firebase 설정 -->
    <script src="js/firebase-config.js"></script>

    <!-- 앱 메인 코드 -->
    <script type="text/babel" src="js/app.js"></script>

    <!-- 서비스 워커 등록 (PWA 오프라인 지원) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
